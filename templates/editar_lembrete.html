{% extends "base.html" %}

{% block title %}Editar Lembrete{% endblock %}

{% block content %}
<section class="pagina">
    <h1>Editar Lembrete</h1>

    <form method="post">
        <label for="titulo">Título</label>
        <input type="text" id="titulo" name="titulo" value="{{ lembrete.titulo }}" required>

        <label for="detalhes">Descrição</label>
        <textarea id="detalhes" name="detalhes" rows="4" required>{{ lembrete.detalhes }}</textarea>

        <div class="acoes">
            <button type="submit">Salvar alterações</button>
            <button id="botao_excluir" type="button" class="secundario">Excluir lembrete</button>
        </div>
    </form>
</section>

<script>
document.getElementById('botao_excluir').addEventListener('click', function() {
    if (confirm('Tem certeza que deseja excluir?')) {
        window.location.href = "/excluir/{{ lembrete.id }}";
    }
});
</script>
{% endblock %}
