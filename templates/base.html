<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Memoriza{% endblock %}</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
</head>
<body>
    <nav>
        <img src="static/assets/Memoriza.png" alt="Memoriza"> <strong>Início | Lembrentes | Conta</strong>
    </nav>
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
    ©️2026 Memoriza. Todos os direitos reservados. <img src="static/assets/Caracol.png" id="logo" alt="Logo Memoriza">
    </footer>

    <script src="{{url_for('static', filename='script.js')}}"></script>
    {% block scripts %}
    {% endblock %}
</body>
</html>
